spring:
  application:
    name: distributed-job-scheduler
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      fail-fast: false
    producer:
      client-id: ${spring.application.name}-producer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        linger.ms: 5
  datasource:
    url: jdbc:postgresql://localhost:5432/jobscheduler
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

app:
  kafka:
    job-queue-high-topic: ${KAFKA_JOB_QUEUE_HIGH_TOPIC:job-queue-high}
    job-queue-low-topic: ${KAFKA_JOB_QUEUE_LOW_TOPIC:job-queue-low}

# OpenAPI 3 + Swagger UI (springdoc). Default: http://localhost:8080/swagger-ui.html (or your SERVER_PORT)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
